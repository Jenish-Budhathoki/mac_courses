<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macalester Full Course Map v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f14;color:#e2e0d8;height:100vh;overflow:hidden}

/* ── TOOLBAR ─────────────────────────────────────────── */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:54px;
  background:#111318;border-bottom:1px solid #1e2230;
  display:flex;align-items:center;gap:10px;padding:0 16px;z-index:200;
}
#toolbar h1{font-size:13px;font-weight:600;color:#f0ede6;white-space:nowrap}
.tsep{width:1px;height:22px;background:#1e2230;flex-shrink:0}
.fgroup{display:flex;gap:4px}
.fb{
  padding:4px 12px;border-radius:14px;border:1px solid transparent;
  background:transparent;color:#606068;cursor:pointer;font-size:11.5px;
  font-weight:500;white-space:nowrap;transition:all .15s;
}
.fb:hover{color:#b0b0b8}
.fb.on{ border-color:var(--dc); background:var(--dbg); color:var(--df); }

.fb[data-dept="COMP"]{--dc:#4444c0;--dbg:#14163a;--df:#a0a0f0}
.fb[data-dept="MATH"]{--dc:#9a6000;--dbg:#1e1500;--df:#e0b060}
.fb[data-dept="STAT"]{--dc:#207050;--dbg:#0a1e15;--df:#60d0a0}
.fb[data-dept="ECON"]{--dc:#6a3aaa;--dbg:#1a0e30;--df:#c090f0}
.fb[data-dept="ECONB"]{--dc:#884aaa;--dbg:#200f2a;--df:#d8a0f8}

#search{
  padding:5px 12px;border-radius:16px;
  border:1px solid #1e2230;background:#181b24;
  color:#e2e0d8;font-size:12px;width:170px;outline:none;
}
#search:focus{border-color:#4040a0}
#search::placeholder{color:#404048}
#count{
  margin-left:auto;background:#181b24;border:1px solid #1e2230;
  border-radius:10px;padding:3px 10px;font-size:11px;color:#505058;white-space:nowrap;
}
#hint{font-size:11px;color:#303038;white-space:nowrap;margin-right:4px}

/* ── CANVAS ─────────────────────────────────────────── */
#wrap{position:fixed;top:54px;left:0;right:0;bottom:0}
svg{width:100%;height:100%}

/* edges */
.edge{fill:none;stroke-width:1.8px;opacity:.35;transition:opacity .15s,stroke-width .15s}
.edge.COMP{stroke:#4444c0}
.edge.MATH{stroke:#9a6000}
.edge.STAT{stroke:#207050}
.edge.ECON{stroke:#6a3aaa}
.edge.ECONB{stroke:#884aaa}
.edge.cross{stroke-dasharray:6,4}
.edge.hl{opacity:1;stroke-width:2.8px}
.edge.fd{opacity:.05}

/* nodes */
.nd{cursor:pointer}
.nd .bg{rx:9;stroke-width:1.2px;transition:opacity .15s}
.nd .ring{rx:9;fill:none;stroke-width:2.5px;opacity:0;transition:opacity .2s}
.nd .ring.on{opacity:1}
.nd.fd .bg{opacity:.12}
.nd.fd text{opacity:.1}

.nd.COMP .bg{fill:#141638;stroke:#3535b0}
.nd.COMP .ring{stroke:#7070e0}
.nd.COMP .lbl{fill:#b0b0f8}
.nd.COMP .cod{fill:#7070c0}
.nd.COMP .trm{fill:#5050a0}

.nd.MATH .bg{fill:#1c1200;stroke:#906000}
.nd.MATH .ring{stroke:#d09030}
.nd.MATH .lbl{fill:#e0b060}
.nd.MATH .cod{fill:#a07030}
.nd.MATH .trm{fill:#806020}

.nd.STAT .bg{fill:#081a12;stroke:#186040}
.nd.STAT .ring{stroke:#28b080}
.nd.STAT .lbl{fill:#60d0a0}
.nd.STAT .cod{fill:#309060}
.nd.STAT .trm{fill:#207050}

.nd.ECON .bg{fill:#160c28;stroke:#5a2a98}
.nd.ECON .ring{stroke:#9060d8}
.nd.ECON .lbl{fill:#c090f8}
.nd.ECON .cod{fill:#8060b0}
.nd.ECON .trm{fill:#604888}

.nd.ECONB .bg{fill:#1a0c28;stroke:#783898}
.nd.ECONB .ring{stroke:#b070d8}
.nd.ECONB .lbl{fill:#d8a0f8}
.nd.ECONB .cod{fill:#9868b8}
.nd.ECONB .trm{fill:#7050a0}

.nd .cod{font-size:10px;font-weight:600}
.nd .lbl{font-size:11.5px;font-weight:500}
.nd .trm{font-size:9px}
.cap-star{font-size:11px;fill:#d0b850;fill-opacity:.7}

/* ── SIDE PANEL ─────────────────────────────────────── */
#panel{
  position:fixed;right:-340px;top:54px;width:340px;bottom:0;
  background:#111318;border-left:1px solid #1e2230;
  overflow-y:auto;transition:right .22s ease;z-index:100;
}
#panel.open{right:0}
#pcls{
  position:sticky;top:0;background:#111318;padding:12px 16px 8px;
  display:flex;justify-content:flex-end;border-bottom:1px solid #1e2230;
  z-index:1;
}
#pcls button{
  background:#181b24;border:1px solid #1e2230;color:#606068;
  width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
}
#pcls button:hover{color:#c0c0c8;background:#1e2230}
#pbody{padding:16px 18px 40px}
.pd{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px}
.pc{font-size:12px;font-weight:600;opacity:.6;margin-bottom:2px}
.pt{font-size:18px;font-weight:500;color:#f0ede6;line-height:1.3;margin-bottom:10px}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.tag-fall{background:#1c1600;color:#d0a030;border:1px solid #4a3a00}
.tag-spring{background:#081a12;color:#30c078;border:1px solid #0a3a20}
.tag-both{background:#0e1428;color:#5080e0;border:1px solid #1e2a50}
.tag-occ{background:#1e0e18;color:#d06088;border:1px solid #4a1a30}
.tag-cap{background:#201800;color:#e0a020;border:1px solid #503800}
.tag-cross{background:#1a1a00;color:#c0c030;border:1px solid #3a3a00}
.psec-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#404048;margin:14px 0 5px}
.psec-body{font-size:12.5px;color:#9a9898;line-height:1.6}
.chip{
  display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;
  font-weight:600;margin:2px 3px 2px 0;cursor:pointer;
  border:1px solid #333;transition:opacity .12s;
}
.chip:hover{opacity:.75}
.chip.COMP{background:#141638;color:#9090e8;border-color:#3535b0}
.chip.MATH{background:#1c1200;color:#d0a050;border-color:#906000}
.chip.STAT{background:#081a12;color:#50c090;border-color:#186040}
.chip.ECON{background:#160c28;color:#b080e8;border-color:#5a2a98}
.chip.ECONB{background:#1a0c28;color:#c898e8;border-color:#783898}

/* ── LEGEND ─────────────────────────────────────────── */
#legend{
  position:fixed;bottom:14px;left:14px;
  background:#111318;border:1px solid #1e2230;
  border-radius:10px;padding:9px 14px;
  display:flex;gap:14px;flex-wrap:wrap;z-index:150;
}
.lg{display:flex;align-items:center;gap:5px;font-size:11px;color:#505058}
.lg-ln{width:20px;height:3px;border-radius:2px}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Macalester Course Map</h1>
  <div class="tsep"></div>
  <div class="fgroup">
    <button class="fb on" data-dept="COMP">CS</button>
    <button class="fb on" data-dept="MATH">Math</button>
    <button class="fb on" data-dept="STAT">Stat / DS</button>
    <button class="fb on" data-dept="ECON">Econ (Group E)</button>
    <button class="fb on" data-dept="ECONB">Econ (Group B)</button>
  </div>
  <div class="tsep"></div>
  <input id="search" placeholder="Search…" type="search">
  <span id="count">— courses</span>
  <div class="tsep"></div>
  <span id="hint">Scroll=zoom · Drag=pan · Click=details</span>
</div>

<div id="wrap"><svg id="g"></svg></div>

<div id="panel">
  <div id="pcls"><button onclick="closePanel()">✕</button></div>
  <div id="pbody">
    <div class="pd" id="pd"></div>
    <div class="pc" id="pc"></div>
    <div class="pt" id="pt"></div>
    <div class="ptags" id="ptags"></div>
    <div class="psec-lbl">Description</div>
    <div class="psec-body" id="pdesc"></div>
    <div class="psec-lbl">Prerequisites</div>
    <div class="psec-body" id="ppre"></div>
    <div class="psec-lbl">Unlocks (courses needing this)</div>
    <div class="psec-body" id="punl"></div>
    <div class="psec-lbl">Cross-listed as</div>
    <div class="psec-body" id="pxl"></div>
  </div>
</div>

<div id="legend">
  <div class="lg"><div class="lg-ln" style="background:#4444c0"></div>CS prereq</div>
  <div class="lg"><div class="lg-ln" style="background:#9a6000"></div>Math prereq</div>
  <div class="lg"><div class="lg-ln" style="background:#207050"></div>Stat prereq</div>
  <div class="lg"><div class="lg-ln" style="background:#6a3aaa"></div>Econ prereq</div>
  <div class="lg"><div class="lg-ln" style="background:#555;border-top:2px dashed #aaa;height:0;width:20px"></div>— dashed = cross-dept</div>
  <div class="lg"><span style="font-size:11px;color:#d0b850">★</span><span>Capstone</span></div>
</div>

<script>
// ════════════════════════════════════════════════════════

// prereqs: array of IDs that MUST be taken before

const C = [

{id:"C112", code:"COMP 112", name:"Intro to Data Science",           dept:"COMP", term:"both", cap:false, cross:"STAT 112",

// ────────────────────────────────────────────────────────
// Build edge list + unlock map
// ────────────────────────────────────────────────────────
const EDGES = [];
const UNLOCK = {};
C.forEach(n=>{
  n.prereqs.forEach(pid=>{
    EDGES.push({src:pid, tgt:n.id});
    if(!UNLOCK[pid]) UNLOCK[pid]=[];
    UNLOCK[pid].push(n.id);
  });
});

// Dept meta
const DMETA={
  COMP: {label:"Computer Science",   stroke:"#4444c0", fill:"#141638"},
  MATH: {label:"Mathematics",        stroke:"#9a6000", fill:"#1c1200"},
  STAT: {label:"Statistics / DS",    stroke:"#207050", fill:"#081a12"},
  ECON: {label:"Econ (Group E)",     stroke:"#6a3aaa", fill:"#160c28"},
  ECONB:{label:"Econ (Group B)",     stroke:"#884aaa", fill:"#1a0c28"},
};

// ────────────────────────────────────────────────────────
// LAYOUT: group by dept, sort by number, assign x/y
// ────────────────────────────────────────────────────────
const NW=152, NH=62, XGAP=56, YGAP=18;
const DEPT_ORDER=["COMP","MATH","STAT","ECON","ECONB"];
let visSet=new Set(DEPT_ORDER);
let searchQ="";
let selId=null;

function numOf(code){ return parseInt(code.replace(/\D+/,""))||0; }

function computePos(nodes){
  const byDept={};
  DEPT_ORDER.forEach(d=>byDept[d]=[]);
  nodes.forEach(n=>{ if(byDept[n.dept]) byDept[n.dept].push(n); });
  DEPT_ORDER.forEach(d=>byDept[d].sort((a,b)=>numOf(a.code)-numOf(b.code)));
  const pos={};
  let xCur=60;
  DEPT_ORDER.forEach(d=>{
    const list=byDept[d];
    if(!list||!list.length) return;
    list.forEach((n,i)=>{ pos[n.id]={x:xCur, y:70+i*(NH+YGAP)}; });
    xCur+=NW+XGAP;
  });
  return pos;
}

// ────────────────────────────────────────────────────────
// SVG setup
// ────────────────────────────────────────────────────────
const svg=d3.select("#g");
const defs=svg.append("defs");

// Per-dept arrowheads
Object.entries(DMETA).forEach(([d,m])=>{
  defs.append("marker").attr("id","arr-"+d)
    .attr("viewBox","0 0 10 10").attr("refX",9).attr("refY",5)
    .attr("markerWidth",7).attr("markerHeight",7).attr("orient","auto-start-reverse")
    .append("path").attr("d","M1,1 L9,5 L1,9")
    .attr("fill","none").attr("stroke",m.stroke).attr("stroke-width",2).attr("stroke-linecap","round");
  // highlighted version (brighter)
  defs.append("marker").attr("id","arr-hl-"+d)
    .attr("viewBox","0 0 10 10").attr("refX",9).attr("refY",5)
    .attr("markerWidth",7).attr("markerHeight",7).attr("orient","auto-start-reverse")
    .append("path").attr("d","M1,1 L9,5 L1,9")
    .attr("fill","none").attr("stroke","#ffffff").attr("stroke-width",2).attr("stroke-linecap","round");
});
// cross-dept: no separate marker; uses source-dept colored marker

const canvas=svg.append("g").attr("id","canvas");
svg.call(
  d3.zoom().scaleExtent([.08,3])
    .on("zoom",e=>canvas.attr("transform",e.transform))
);

let edgeSel, nodeSel, pos={};

function getVisible(){
  const q=searchQ.toLowerCase();
  return C.filter(n=>{
    if(!visSet.has(n.dept)) return false;
    if(q && !n.code.toLowerCase().includes(q) && !n.name.toLowerCase().includes(q) && !n.desc.toLowerCase().includes(q)) return false;
    return true;
  });
}


function render(){
  canvas.selectAll("*").remove();
  const vis=getVisible();
  const visIds=new Set(vis.map(v=>v.id));
  document.getElementById("count").textContent=vis.length+" courses";

  pos=computePos(vis);

  // ── department column header labels
  const seenDept=new Set();
  vis.forEach(n=>seenDept.add(n.dept));
  const hdrData=[];
  DEPT_ORDER.forEach(d=>{
    if(!seenDept.has(d)) return;
    const list=vis.filter(n=>n.dept===d);
    if(!list.length) return;
    const xs=list.map(n=>pos[n.id].x);
    hdrData.push({dept:d, x:xs[0]+NW/2, label:DMETA[d].label, stroke:DMETA[d].stroke});
  });
  canvas.selectAll(".dhdr").data(hdrData).enter().append("text")
    .attr("class","dhdr")
    .attr("x",d=>d.x).attr("y",30)
    .attr("text-anchor","middle")
    .attr("font-size","11px").attr("font-weight","700")
    .attr("letter-spacing",".07em").attr("fill",d=>d.stroke)
    .attr("opacity",.7)
    .text(d=>d.label.toUpperCase());

  // ── edges
  const edgeData=EDGES.filter(e=>visIds.has(e.src)&&visIds.has(e.tgt));
  const srcOf=id=>{const n=C.find(x=>x.id===id);return n?n.dept:"COMP";};

  edgeSel=canvas.selectAll(".edge").data(edgeData).enter().append("path")
    .attr("class",e=>{
      const sd=srcOf(e.src), td=srcOf(e.tgt);
      return "edge "+sd+(sd===td?"":" cross");
    })
    .attr("marker-end",e=>{
      const sd=srcOf(e.src);
      return "url(#arr-"+sd+")";
    })
    .attr("d",e=>{
      const sp=pos[e.src], tp=pos[e.tgt];
      if(!sp||!tp) return "";
      const sx=sp.x+NW, sy=sp.y+NH/2;
      const tx=tp.x, ty=tp.y+NH/2;
      // gentle S-curve
      const cpx1=sx+Math.abs(tx-sx)*.5, cpx2=tx-Math.abs(tx-sx)*.5;
      return `M${sx},${sy} C${cpx1},${sy} ${cpx2},${ty} ${tx},${ty}`;
    });

  // ── nodes
  const ng=canvas.selectAll(".nd").data(vis,d=>d.id).enter().append("g")
    .attr("class",d=>"nd "+d.dept)
    .attr("transform",d=>{const p=pos[d.id];return `translate(${p.x},${p.y})`;})
    .on("click",(_,d)=>clickNode(d));

  ng.append("rect").attr("class","bg").attr("width",NW).attr("height",NH);
  ng.append("rect").attr("class","ring").attr("width",NW).attr("height",NH).attr("id",d=>"ring-"+d.id);

  // code
  ng.append("text").attr("class","cod").attr("x",10).attr("y",17).text(d=>d.code);
  // name (wrap 2 lines)
  ng.append("text").attr("class","lbl").attr("x",10).attr("y",31).each(function(d){
    const el=d3.select(this);
    const words=d.name.split(" ");
    let line="",lines=[];
    words.forEach(w=>{
      const test=line?line+" "+w:w;
      if(test.length>17&&line){lines.push(line);line=w;}else line=test;
    });
    if(line) lines.push(line);
    lines.slice(0,2).forEach((l,i)=>
      el.append("tspan").attr("x",10).attr("dy",i===0?0:14).text(l)
    );
  });
  // term
  ng.append("text").attr("class","trm")
    .attr("x",NW-7).attr("y",NH-7).attr("text-anchor","end")
    .text(d=>({fall:"Fall",spring:"Spring",both:"All sems",occ:"Occasional"}[d.term]||""));
  // capstone star
  ng.filter(d=>d.cap).append("text").attr("class","cap-star")
    .attr("x",NW-8).attr("y",16).attr("text-anchor","end").text("★");

  nodeSel=ng;

  // restore selection highlight if still visible
  if(selId && visIds.has(selId)){
    const nd=C.find(x=>x.id===selId);
    if(nd) applyHighlight(nd, false);
  } else if(selId && !visIds.has(selId)){
    selId=null; closePanel();
  }

  // fit initial view
  const allP=Object.values(pos);
  if(allP.length){
    const maxX=Math.max(...allP.map(p=>p.x))+NW+60;
    const maxY=Math.max(...allP.map(p=>p.y))+NH+60;
    const svgEl=document.getElementById("g");
    const W=svgEl.clientWidth||1200, H=svgEl.clientHeight||700;
    const sc=Math.min(W/maxX, H/maxY, .85);
    const tx=(W-maxX*sc)/2, ty=28;
    svg.call(d3.zoom().transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
    canvas.attr("transform",`translate(${tx},${ty}) scale(${sc})`);
  }
}

function clickNode(d){
  if(selId===d.id){ selId=null; clearHL(); closePanel(); return; }
  selId=d.id;
  applyHighlight(d, true);
  showPanel(d);
}

function applyHighlight(d, openPnl){
  if(!nodeSel||!edgeSel) return;
  const preSet=new Set(d.prereqs);
  const unlSet=new Set((UNLOCK[d.id]||[]).filter(x=>pos[x]));

  nodeSel
    .classed("fd", n=>!(n.id===d.id || preSet.has(n.id) || unlSet.has(n.id)))
    .select(".ring").classed("on", (n,i,nodes)=>{
      const pid=d3.select(nodes[i].parentNode).datum().id;
      return pid===d.id||preSet.has(pid)||unlSet.has(pid);
    });

  edgeSel
    .classed("hl", e=>(e.src===d.id||e.tgt===d.id)&&pos[e.src]&&pos[e.tgt])
    .classed("fd", e=>!(e.src===d.id||e.tgt===d.id))
    .attr("marker-end",e=>{
      const hl=(e.src===d.id||e.tgt===d.id)&&pos[e.src]&&pos[e.tgt];
      const srcDept=(C.find(x=>x.id===e.src)||{dept:"COMP"}).dept;
      const tgtDept=(C.find(x=>x.id===e.tgt)||{dept:"COMP"}).dept;
      if(hl) return "url(#arr-hl-"+srcDept+")";
      return "url(#arr-"+srcDept+")";
    });
}

function clearHL(){
  if(nodeSel) nodeSel.classed("fd",false).select(".ring").classed("on",false);
  if(edgeSel) edgeSel.classed("hl fd",false).attr("marker-end",e=>{
    const sd=(C.find(x=>x.id===e.src)||{dept:"COMP"}).dept;
    const td=(C.find(x=>x.id===e.tgt)||{dept:"COMP"}).dept;
    return "url(#arr-"+sd+")";
  });
}

function showPanel(d){
  const dm=DMETA[d.dept]||{label:d.dept};
  document.getElementById("pd").textContent=dm.label;
  document.getElementById("pd").style.color=DMETA[d.dept]?.stroke||"#888";
  document.getElementById("pc").textContent=d.code;
  document.getElementById("pt").textContent=d.name;
  document.getElementById("pdesc").textContent=d.desc;

  // tags
  const tags=document.getElementById("ptags");
  tags.innerHTML="";
  const tc={fall:"tag-fall",spring:"tag-spring",both:"tag-both",occ:"tag-occ"};
  const tl={fall:"Fall only",spring:"Spring only",both:"Every semester",occ:"Occasional"};
  tags.innerHTML+=`<span class="tag ${tc[d.term]||"tag-occ"}">${tl[d.term]||d.term}</span>`;
  if(d.cap) tags.innerHTML+=`<span class="tag tag-cap">★ Capstone</span>`;
  if(d.cross) tags.innerHTML+=`<span class="tag tag-cross">⇄ ${d.cross}</span>`;

  // prereqs
  const preEl=document.getElementById("ppre");
  if(!d.prereqs.length){ preEl.innerHTML="<em style='color:#404048'>None — open to all.</em>"; }
  else{
    preEl.innerHTML="";
    d.prereqs.forEach(pid=>{
      const p=C.find(x=>x.id===pid);
      const ch=document.createElement("span");
      ch.className="chip "+(p?p.dept:"COMP");
      ch.textContent=p?p.code:pid;
      ch.title=p?p.name:"";
      ch.addEventListener("click",()=>{ const fc=C.find(x=>x.id===pid); if(fc) clickNode(fc); });
      preEl.appendChild(ch);
    });
  }

  // unlocks
  const unlEl=document.getElementById("punl");
  const unl=(UNLOCK[d.id]||[]);
  if(!unl.length){ unlEl.innerHTML="<em style='color:#404048'>No courses listed as needing this.</em>"; }
  else{
    unlEl.innerHTML="";
    unl.forEach(uid=>{
      const u=C.find(x=>x.id===uid);
      if(!u) return;
      const ch=document.createElement("span");
      ch.className="chip "+u.dept;
      ch.textContent=u.code;
      ch.title=u.name;
      ch.addEventListener("click",()=>clickNode(u));
      unlEl.appendChild(ch);
    });
  }

  document.getElementById("pxl").textContent=d.cross||"None";
  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  selId=null; clearHL();
}

// ── CONTROLS
document.querySelectorAll(".fb[data-dept]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const d=btn.dataset.dept;
    if(visSet.has(d)){visSet.delete(d);btn.classList.remove("on");}
    else{visSet.add(d);btn.classList.add("on");}
    render();
  });
});

document.getElementById("search").addEventListener("input",e=>{
  searchQ=e.target.value; render();
});

render();
</script>
</body>
</html>
